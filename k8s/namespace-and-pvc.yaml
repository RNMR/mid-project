apiVersion: v1
kind: Namespace
metadata:
  name: rag
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: rag
spec:
  accessModes:
    - ReadWriteMany          # compartido entre pods de API y ETL
  storageClassName: efs-sc   # AWS EFS para acceso multi-pod (EKS)
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: source-docs-pvc
  namespace: rag
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 10Gi
---
# Referencia: los secrets se crean con:
#   kubectl create secret generic rag-secrets \
#     --from-literal=anthropic-api-key=$ANTHROPIC_API_KEY \
#     -n rag
# En producción usar AWS Secrets Manager + External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag
type: Opaque
# data se inyecta externamente — nunca commitar valores reales
