apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag
  labels:
    app: rag-api
    paso: "5"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      # Paso 5 – Anti-affinity: distribuir réplicas entre zonas de disponibilidad
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rag-api
                topologyKey: topology.kubernetes.io/zone

      # Non-root por seguridad (Paso 4)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: api
          image: distributed-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: rag-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: anthropic-api-key
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          # Liveness: si el proceso muere, K8s reinicia el pod
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # Readiness: pod no recibe tráfico hasta estar listo
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: chroma-data
              mountPath: /app/data/chroma_db

      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-pvc
